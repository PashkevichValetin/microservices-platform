spring:
  application:
    name: data-unifier-service

  kafka:
    bootstrap-servers: kafka:9092
    admin:
      fail-fast: false
    consumer:
      group-id: universal-aggregator
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-startup: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    properties:
      spring.json.type.mapping: unifiedCustomerDto:com.pashcevich.data_unifier.adapter.kafka.producer.dto.UnifiedCustomerDto

# MySQL с увеличенными timeout
mysql:
  datasource:
    url: jdbc:mysql://mysql-orders:3306/order_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&connectTimeout=30000&socketTimeout=30000
    username: app_user
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 5

# PostgreSQL
postgres:
  datasource:
    url: jdbc:postgresql://postgres-data:5432/user_db?ssl=false&connectTimeout=30&socketTimeout=30
    username: app_user
    password: password
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 5

# App configuration
app:
  kafka:
    topic:
      unified-customers: unified-customers

  scheduler:
    enabled: true
    unification:
      cron: "0 */5 * * * *"

  batch:
    size: 100

server:
  port: 8080

logging:
  level:
    com.pashcevich: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

management:
  endpoint:
    health:
      show-details: always
      show-components: always
  endpoints:
    web:
      exposure:
        include: "*"
      base-path: /actuator
