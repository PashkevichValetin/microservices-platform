global:
  scrape_interval: 10s

scrape_configs:
  - job_name: 'spring-apps'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'data-unifier-service:8080'
          - 'gateway-service:8080'
          - 'reactor-adapter-service:8080'
          - 'monitoring-service:8080'
