spring:
  redis:
    host: redis
    port: 6379
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/realms/master
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
management:
  health:
    redis:
      enabled: true
  endpoint:
    health:
      show-details: always
