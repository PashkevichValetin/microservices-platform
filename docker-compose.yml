version: '3.8'

services:
  # --- БАЗЫ ДАННЫХ ---
  postgres-data:
    image: postgres:15-alpine
    container_name: postgres-data-db
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U app_user -d user_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - platform-net

  mysql-orders:
    image: mysql:8.0
    container_name: mysql-orders-db
    environment:
      MYSQL_DATABASE: order_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "app_user", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - platform-net

  postgres-monitor:
    image: postgres:15-alpine
    container_name: postgres-monitor-db
    environment:
      POSTGRES_DB: monitor_db
      POSTGRES_USER: monitor_user
      POSTGRES_PASSWORD: pass
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitor_user -d monitor_db"]
      interval: 5s
    networks:
      - platform-net

  redis:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    networks:
      - platform-net

  # --- ИНФРАСТРУКТУРА (Kafka & Zookeeper) ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 5s
      retries: 5
    networks:
      - platform-net

  kafka: # Ключ сервиса для depends_on
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka-broker
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # ИСПРАВЛЕНО: Рекламируем себя как kafka-broker для внутренней сети
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka-broker:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      retries: 5
    networks:
      - platform-net

  # --- AUTH & MONITORING TOOLS ---
  keycloak:
    image: quay.io/keycloak/keycloak:22.0.1
    container_name: keycloak-auth
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: dev-file
    ports:
      - "8080:8080"
    command: start-dev
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - platform-net

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - platform-net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - platform-net

  # --- МИКРОСЕРВИСЫ ---
  data-unifier:
    build: ./data-unifier
    container_name: data-unifier-service
    ports:
      - "8081:8080"
    depends_on:
      mysql-orders:
        condition: service_healthy
      postgres-data:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - mysql.datasource.url=jdbc:mysql://mysql-orders-db:3306/order_db
      - mysql.datasource.username=app_user
      - mysql.datasource.password=password
      - postgres.datasource.url=jdbc:postgresql://postgres-data-db:5432/user_db
      - postgres.datasource.username=app_user
      - postgres.datasource.password=password
      # ИСПРАВЛЕНО: Стучимся на kafka-broker
      - kafka.bootstrap.servers=kafka-broker:29092
    networks:
      - platform-net
    restart: always

  reactor-adapter:
    build: ./reactor-adapter-kit
    container_name: reactor-adapter-service
    ports:
      - "8082:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      # ИСПРАВЛЕНО: Стучимся на kafka-broker
      - KAFKA_BOOTSTRAP_SERVERS=kafka-broker:29092
    networks:
      - platform-net
    restart: always

  dmonitorapp:
    build: ./dmonitorapp
    container_name: monitoring-service
    ports:
      - "8083:8080"
    depends_on:
      postgres-monitor:
        condition: service_healthy
      data-unifier:
        condition: service_started
    environment:
      - SPRING_R2DBC_URL=r2dbc:postgresql://postgres-monitor-db:5432/monitor_db
      - MONITORED_SERVICES=data-unifier-service:8081,reactor-adapter-service:8082
    networks:
      - platform-net

  gateway:
    build:
      context: ./gateway-service
      dockerfile: Dockerfile
    container_name: gateway-service
    ports:
      - "8088:8080"
    restart: always
    depends_on:
      redis:
        condition: service_started
      keycloak:
        condition: service_started
    environment:
      - SPRING_REDIS_HOST=redis-cache
      - SPRING_REDIS_PORT=6379
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=http://keycloak-auth:8080/realms/master
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI=http://keycloak-auth:8080/realms/master/protocol/openid-connect/certs
    networks:
      - platform-net

networks:
  platform-net:
    driver: bridge

volumes:
  postgres_data:
  mysql_data:
  prometheus_data:
  grafana_data:
