version: '3.8'

services:
  postgres-data:
    image: postgres:15-alpine
    container_name: postgres-data-db
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    networks:
      - platform-net

  mysql-orders:
    image: mysql:8.0
    container_name: mysql-orders-db
    environment:
      MYSQL_DATABASE: order_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    networks:
      - platform-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - platform-net

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka-broker
    depends_on:
      - zookeeper
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    networks:
      - platform-net

  postgres-monitor:
    image: postgres:15-alpine
    container_name: postgres-monitor-db
    environment:
      POSTGRES_DB: monitor_db
      POSTGRES_USER: monitor_user
      POSTGRES_PASSWORD: pass
    ports:
      - "5433:5432"
    networks:
      - platform-net

  redis:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    networks:
      - platform-net

  keycloak:
    image: quay.io/keycloak/keycloak:22.0.1
    container_name: keycloak-auth
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: dev-file
    ports:
      - "8080:8080"
    command: start-dev
    networks:
      - platform-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  data-unifier:
    build: ./data-unifier
    container_name: data-unifier-service
    ports:
      - "8081:8080"
    depends_on:
      - postgres-data
      - mysql-orders
      - kafka
    environment:
      POSTGRES_HOST: postgres-data
      MYSQL_HOST: mysql-orders
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - platform-net

  reactor-adapter:
    build: ./reactor-adapter-kit
    container_name: reactor-adapter-service
    ports:
      - "8082:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - platform-net

  dmonitorapp:
    build: ./dmonitorapp
    container_name: monitoring-service
    ports:
      - "8083:8080"
    depends_on:
      - postgres-monitor
      - data-unifier
      - reactor-adapter
    environment:
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres-monitor:5432/monitor_db
      MONITORED_SERVICES: "data-unifier:8081,reactor-adapter:8082"
    networks:
      - platform-net

  gateway:
    build:
      context: ./gateway-service
      dockerfile: Dockerfile
    container_name: gateway-service
    ports:
      - "8088:8080"
    depends_on:
      - redis
      - keycloak
    environment:
      SPRING_REDIS_HOST: redis-cache
      SPRING_REDIS_PORT: 6379
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: "http://keycloak-auth:8080/realms/master"
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: "http://keycloak-auth:8080/realms/master/protocol/openid-connect/certs"
      SPRING_CLOUD_GATEWAY_DISCOVERY_LOCATOR_ENABLED: "false"
    networks:
      - platform-net

networks:
  platform-net:
    driver: bridge
